<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romeinse Legionair - Uitrusting Spel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #2C1810; color: #F5E6C8; min-height: 100vh; padding: 1rem; }
  h1 { text-align: center; font-size: 1.6rem; color: #D4A843; margin-bottom: 0.25rem; letter-spacing: 2px; }
  .subtitle { text-align: center; font-size: 0.85rem; color: #C8A870; margin-bottom: 1rem; }
  #header { display: flex; justify-content: space-between; align-items: center; max-width: 860px; margin: 0 auto 0.75rem; }
  #score-area { font-size: 1rem; color: #C8A870; }
  #score-val { font-size: 1.4rem; font-weight: bold; color: #D4A843; }
  #reset-btn { padding: 8px 18px; cursor: pointer; border-radius: 6px; border: 1px solid #D4A843; background: #3D1F08; color: #D4A843; font-family: Georgia, serif; font-size: 0.85rem; }
  #reset-btn:hover { background: #5A3010; }
  #main { display: flex; gap: 1.5rem; max-width: 860px; margin: 0 auto; align-items: flex-start; }
  #soldier-area { position: relative; background: #1A0E06; border-radius: 10px; border: 1px solid #6B4020; padding: 1rem; flex: 0 0 auto; }
  #soldier-area svg { display: block; }
  .drop-zone { cursor: default; }
  .drop-zone rect, .drop-zone ellipse, .drop-zone path { transition: fill 0.2s; }
  .drop-zone.over rect, .drop-zone.over ellipse, .drop-zone.over path { stroke: #FFD700 !important; stroke-width: 3 !important; fill: rgba(255,215,0,0.12) !important; }
  .drop-zone.correct rect, .drop-zone.correct ellipse, .drop-zone.correct path { fill: rgba(60,150,60,0.25) !important; stroke: #4CAF50 !important; stroke-width: 2.5 !important; }
  .drop-zone.wrong rect, .drop-zone.wrong ellipse, .drop-zone.wrong path { fill: rgba(200,50,50,0.25) !important; stroke: #E53935 !important; stroke-width: 2.5 !important; }
  .zone-label { font-size: 9px; fill: #FFD700; font-family: Georgia, serif; pointer-events: none; font-weight: bold; }
  .zone-label.answered { fill: #7CFC00; font-size: 8.5px; }
  #items-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .panel-title { font-size: 0.85rem; color: #C8A870; margin-bottom: 4px; border-bottom: 1px solid #6B4020; padding-bottom: 6px; }
  .item-card { background: #3D1F08; border: 1px solid #6B4020; border-radius: 6px; padding: 10px 14px; cursor: grab; user-select: none; transition: transform 0.1s, border-color 0.15s; }
  .item-card:hover { border-color: #D4A843; transform: translateX(3px); }
  .item-card.dragging { opacity: 0.35; cursor: grabbing; }
  .item-card.used { display: none; }
  .item-lat { font-size: 0.95rem; font-weight: bold; color: #D4A843; }
  .item-nl { font-size: 0.78rem; color: #C8A870; margin-top: 2px; }
  #feedback { min-height: 32px; margin-top: 0.75rem; font-size: 0.85rem; text-align: center; font-weight: bold; padding: 6px; border-radius: 6px; }
  #feedback.ok { color: #7CFC00; background: rgba(0,100,0,0.2); }
  #feedback.err { color: #FF6B6B; background: rgba(100,0,0,0.2); }
  #victory { display: none; text-align: center; padding: 2rem 1rem; background: rgba(212,168,67,0.1); border-radius: 10px; border: 1px solid #D4A843; max-width: 860px; margin: 2rem auto; }
  #victory h3 { font-size: 1.8rem; color: #D4A843; margin-bottom: 0.5rem; }
  #victory p { color: #C8A870; font-size: 1rem; line-height: 1.6; }
  #victory button { margin-top: 1rem; padding: 10px 24px; cursor: pointer; border-radius: 6px; border: 1px solid #D4A843; background: #3D1F08; color: #D4A843; font-family: Georgia, serif; font-size: 1rem; }
  #progress { display: flex; gap: 4px; margin-top: 0.5rem; justify-content: center; }
  .pip { width: 12px; height: 12px; border-radius: 50%; background: #6B4020; border: 1px solid #8B6020; transition: background 0.3s; }
  .pip.done { background: #D4A843; }
</style>
</head>

         ondragover="onOver(event,'zone-galea')" ondragleave="onLeave('zone-galea')" ondrop="onDrop(event,'zone-galea')">

      </g>

      <!-- 2. Lorica Segmentata (pantser) - romp -->
      <g class="drop-zone" id="zone-lorica" data-item="lorica"

      </g>

      <!-- 4. Gladius (zwaard) - linkerhand soldaat -->

    <div id="feedback"></div>

  <div id="items-panel">
    <div class="panel-title">&#9876; Sleep naar de juiste plek:</div>
  </div>
</div>

<div id="victory">
  <h3>&#127981; VICTORIA! &#127981;</h3>
  <p>Uitstekend, legionair!<br>Je kent alle uitrusting van een Romeinse soldaat.<br><em>Roma invicta!</em></p>
  <button onclick="resetGame()">Speel opnieuw</button>
</div>

<script>
const items = [
  { id:"galea",    lat:"Galea",             nl:"Bronzen helm",            hint:"De helm zit bovenop het hoofd, met een pluim" },
  { id:"lorica",   lat:"Lorica Segmentata", nl:"Gesegmenteerd pantser",   hint:"Het pantser bedekt de borst en buik" },
  { id:"scutum",   lat:"Scutum",            nl:"Rechthoekig schild",      hint:"Het grote schild aan de linkerkant" },
  { id:"gladius",  lat:"Gladius",           nl:"Kort zwaard",             hint:"Het korte zwaard hangt rechts" },
  { id:"cingulum", lat:"Cingulum",          nl:"Militaire riem",          hint:"De riem zit om de taille, met hangende strips" },
  { id:"caligae",  lat:"Caligae",           nl:"Genagelde sandalen",      hint:"De sandalen zitten aan de voeten onderaan" },
  { id:"pilum",    lat:"Pilum",             nl:"Werpspeer",               hint:"De lange speer staat helemaal rechts" },

];

let score = 0, dragging = null, pipCount = 0;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

function buildPanel(){
  const panel = document.getElementById('items-panel');
  while(panel.children.length > 1) panel.removeChild(panel.lastChild);
  shuffle([...items]).forEach(item=>{
    const c = document.createElement('div');
    c.className = 'item-card'; c.id = 'item-'+item.id; c.draggable = true;
    c.innerHTML = '<div class="item-lat">'+item.lat+'</div><div class="item-nl">'+item.nl+'</div>';
    c.addEventListener('dragstart', ()=>{ dragging=item.id; setTimeout(()=>c.classList.add('dragging'),0); });
    c.addEventListener('dragend', ()=>{ c.classList.remove('dragging'); dragging=null; });
    panel.appendChild(c);
  });
}

function onOver(e,id){ e.preventDefault(); const z=document.getElementById(id); if(!z.classList.contains('correct')) z.classList.add('over'); }
function onLeave(id){ document.getElementById(id).classList.remove('over'); }

function onDrop(e,id){
  e.preventDefault();
  const zone = document.getElementById(id); zone.classList.remove('over');
  if(zone.classList.contains('correct') || !dragging) return;
  const expected = zone.dataset.item;
  const fb = document.getElementById('feedback');
  if(dragging === expected){
    zone.classList.add('correct');
    const lbl = document.getElementById('label-'+expected);
    const item = items.find(i=>i.id===expected);
    lbl.textContent = item.lat; lbl.classList.add('answered');
    document.getElementById('item-'+dragging).classList.add('used');
    score++; document.getElementById('score-val').textContent = score;
    document.getElementById('pip-'+(score-1)).classList.add('done');
    fb.textContent = '✓ Correct! '+item.lat+' = '+item.nl;
    fb.className = 'ok';
    if(score === items.length){
      setTimeout(()=>{
        document.getElementById('main').style.display = 'none';
        document.getElementById('victory').style.display = 'block';
      }, 900);
    }
  } else {
    zone.classList.add('wrong');
    const exp = items.find(i=>i.id===expected);
    fb.textContent = '✗ Fout! Hint: '+exp.hint;
    fb.className = 'err';
    setTimeout(()=>zone.classList.remove('wrong'), 900);
  }
  setTimeout(()=>{ fb.style.opacity='0'; setTimeout(()=>{ fb.style.opacity='1'; fb.textContent=''; fb.className=''; },300); }, 2800);
}

function resetGame(){
  score = 0; dragging = null;
  document.getElementById('score-val').textContent = 0;
  document.getElementById('feedback').textContent = '';
  document.getElementById('main').style.display = '';
  document.getElementById('victory').style.display = 'none';
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('correct','wrong','over'));
  document.querySelectorAll('.pip').forEach(p=>p.classList.remove('done'));
  items.forEach(item=>{
    const lbl = document.getElementById('label-'+item.id);
    if(lbl){ lbl.textContent = item.lat+'?'; lbl.classList.remove('answered'); }
  });
  buildPanel();
}

buildPanel();
</script>
</body>
